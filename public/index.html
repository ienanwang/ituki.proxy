<!DOCTYPE html>
<html>
<head>
    <title>ITUKI-PROXY</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a1a1a; color: white; margin: 0; }
        .container { background: #333; padding: 2rem; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; background: #000; color: #fff; }
        button { width: 100%; padding: 12px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ITUKI-PROXY</h1>
        <form id="uv-form">
            <input id="uv-address" type="text" placeholder="输入网址或搜索 (默认日文Poki)">
            <button id="uv-submit">进入游戏</button>
        </form>
    </div>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script src="index.js"></script> 
</body>
</html>
